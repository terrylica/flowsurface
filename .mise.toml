# Flowsurface — fork-specific mise configuration
# Upstream: https://github.com/flowsurface-rs/flowsurface
# Fork: https://github.com/terrylica/flowsurface
min_version = "2024.9.5"

[tools]
rust = "1.93.1"
"cargo:apple-codesign" = "latest"

[env]
FLOWSURFACE_CH_HOST = "localhost"
FLOWSURFACE_CH_PORT = "18123"
FLOWSURFACE_SSE_ENABLED = "false"  # disabled: awaiting crate release with _us field fix (opendeviationbar-py#336)
FLOWSURFACE_SSE_HOST = "localhost"
FLOWSURFACE_SSE_PORT = "18081"
FLOWSURFACE_OUROBOROS_MODE = "aion"
FLOWSURFACE_ALWAYS_ON_TOP = "1"
# Telegram telemetry bot — credentials read from secrets files
FLOWSURFACE_TG_BOT_TOKEN = "{{read_file(path=env.HOME ~ '/.claude/.secrets/flowsurface-tg-bot-token') | trim}}"
FLOWSURFACE_TG_CHAT_ID = "{{read_file(path=env.HOME ~ '/.claude/.secrets/flowsurface-tg-chat-id') | trim}}"
MACOSX_DEPLOYMENT_TARGET = "11.0"

[task_config]
includes = [
  ".mise/tasks/dev.toml",
  ".mise/tasks/release.toml",
  ".mise/tasks/upstream.toml",
  ".mise/tasks/infra.toml",
]
