# Infrastructure tasks for flowsurface
# SSH tunnel to bigblack ClickHouse for range bar data

["tunnel:start"]
description = "Start SSH tunnel to bigblack with ZeroTier self-healing"
run = """
set -e

# bigblack ZeroTier Node ID (immutable) and IPs
BIGBLACK_ZT_NODE="8f53f201b7"
BIGBLACK_ZT_IP="172.25.253.142"
BIGBLACK_LAN_IP="192.168.0.111"

if lsof -ti:18123 >/dev/null 2>&1; then
  echo "Tunnel already running on port 18123"
  exit 0
fi

# --- ZeroTier health probe ---
zt_peer_status() {
  sudo zerotier-cli peers 2>/dev/null | awk -v node="$BIGBLACK_ZT_NODE" '$1 == node { print $5 }'
}

zt_local_status() {
  sudo zerotier-cli info 2>/dev/null | awk '{ print $5 }'
}

SSH_KEEPALIVE_OPTS="-o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o ExitOnForwardFailure=yes -o ConnectTimeout=8"
SSH_FORWARD_OPTS="-NL 18123:localhost:8123 -L 18081:localhost:8081"

try_ssh_tunnel() {
  local host="$1"
  local label="$2"
  echo "  Trying SSH tunnel via ${label} (${host})..."
  if command -v autossh >/dev/null 2>&1; then
    # autossh restarts SSH on exit; -M 0 disables monitor port (relies on SSH keepalive)
    AUTOSSH_PIDFILE="/tmp/flowsurface-tunnel.pid"
    export AUTOSSH_PIDFILE
    if autossh -M 0 -f $SSH_KEEPALIVE_OPTS $SSH_FORWARD_OPTS "$host" 2>/dev/null; then
      echo "SSH tunnel started via autossh (${label}): localhost:18123→${host}:8123 + localhost:18081→${host}:8081"
      echo "  autossh will auto-reconnect on tunnel death"
      return 0
    fi
  else
    if ssh $SSH_KEEPALIVE_OPTS -f $SSH_FORWARD_OPTS "$host" 2>/dev/null; then
      echo "SSH tunnel started via ${label}: localhost:18123→${host}:8123 + localhost:18081→${host}:8081"
      echo "  TIP: brew install autossh — enables auto-reconnect on tunnel death"
      return 0
    fi
  fi
  return 1
}

echo "=== ZeroTier Health Probe ==="

# Step 1: Check local ZeroTier service
LOCAL_STATUS=$(zt_local_status)
if [ "$LOCAL_STATUS" != "ONLINE" ]; then
  echo "  Local ZeroTier status: ${LOCAL_STATUS:-UNKNOWN} — restarting service..."
  sudo launchctl unload /Library/LaunchDaemons/com.zerotier.one.plist 2>/dev/null || true
  sleep 1
  sudo launchctl load /Library/LaunchDaemons/com.zerotier.one.plist
  sleep 3
  LOCAL_STATUS=$(zt_local_status)
  echo "  Local ZeroTier status after restart: ${LOCAL_STATUS:-UNKNOWN}"
fi

# Step 2: Check bigblack peer status
PEER_LINK=$(zt_peer_status)
echo "  bigblack peer ($BIGBLACK_ZT_NODE): link=${PEER_LINK:-NOT_FOUND}"

if [ "$PEER_LINK" != "DIRECT" ]; then
  echo "  Peer not DIRECT — restarting local ZeroTier to force NAT re-punch..."
  sudo launchctl unload /Library/LaunchDaemons/com.zerotier.one.plist 2>/dev/null || true
  sleep 1
  sudo launchctl load /Library/LaunchDaemons/com.zerotier.one.plist
  # Wait for peer discovery (ZT needs time to re-negotiate paths)
  echo "  Waiting for peer re-negotiation (up to 15s)..."
  for i in $(seq 1 5); do
    sleep 3
    PEER_LINK=$(zt_peer_status)
    echo "    attempt $i/5: link=${PEER_LINK:-NOT_FOUND}"
    if [ "$PEER_LINK" = "DIRECT" ]; then
      break
    fi
  done
fi

echo ""
echo "=== SSH Tunnel ==="

# Step 3: Try ZeroTier IP first, then LAN fallback
if try_ssh_tunnel bigblack "ZeroTier ($BIGBLACK_ZT_IP)"; then
  exit 0
fi

echo "  ZeroTier SSH failed — trying LAN fallback ($BIGBLACK_LAN_IP)..."
if try_ssh_tunnel "$BIGBLACK_LAN_IP" "LAN"; then
  exit 0
fi

echo "" >&2
echo "TUNNEL FAILED: bigblack unreachable via ZeroTier + LAN" >&2
echo "" >&2
echo "  ZeroTier: $BIGBLACK_ZT_IP (peer: ${PEER_LINK:-NOT_FOUND})" >&2
echo "  LAN:      $BIGBLACK_LAN_IP" >&2
echo "" >&2
echo "  Check:" >&2
echo "    - Is bigblack powered on?" >&2
echo "    - ping $BIGBLACK_ZT_IP" >&2
echo "    - sudo zerotier-cli peers | grep $BIGBLACK_ZT_NODE" >&2
exit 1
"""

["tunnel:stop"]
description = "Stop SSH tunnel to bigblack ClickHouse"
run = """
# Kill autossh parent first (if present) so it doesn't respawn
AUTOSSH_PID=""
if [ -f /tmp/flowsurface-tunnel.pid ]; then
  AUTOSSH_PID=$(cat /tmp/flowsurface-tunnel.pid 2>/dev/null)
  if [ -n "$AUTOSSH_PID" ] && kill -0 "$AUTOSSH_PID" 2>/dev/null; then
    kill "$AUTOSSH_PID"
    echo "autossh stopped (pid $AUTOSSH_PID)"
  fi
  rm -f /tmp/flowsurface-tunnel.pid
fi

PID=$(lsof -ti:18123 2>/dev/null)
if [ -n "$PID" ]; then
  kill $PID
  echo "Tunnel stopped (pid $PID)"
elif [ -z "$AUTOSSH_PID" ]; then
  echo "No tunnel running on port 18123"
fi
"""

["tunnel:status"]
description = "Check SSH tunnel status and verify ClickHouse connectivity"
run = """
PID=$(lsof -ti:18123 2>/dev/null)
if [ -n "$PID" ]; then
  echo "Tunnel UP (pid $PID, port 18123)"
  RESULT=$(curl -sf --connect-timeout 2 "http://localhost:18123" --data "SELECT 'ok' FORMAT TabSeparated" 2>&1)
  if [ "$RESULT" = "ok" ]; then
    echo "ClickHouse reachable via tunnel"
    curl -s "http://localhost:18123" --data "SELECT threshold_decimal_bps, count(*) as bars FROM opendeviationbar_cache.open_deviation_bars WHERE symbol = 'BTCUSDT' GROUP BY threshold_decimal_bps ORDER BY threshold_decimal_bps FORMAT TabSeparated"
  else
    echo "WARNING: Tunnel exists but ClickHouse not responding"
  fi
else
  echo "Tunnel DOWN (port 18123 not open)"
fi
"""

[preflight]
description = "Establish tunnel + validate ClickHouse connectivity and data before app launch"
depends = ["tunnel:start"]
run = """
set -e

CH="http://localhost:18123"
MAX_RETRIES=3
RETRY_DELAY=2

echo "=== Flowsurface Preflight ==="

# 0a. Auto-update opendeviationbar crates to latest compatible version
echo ""
echo "[0/5] Updating opendeviationbar crates..."
BEFORE=$(awk -F'"' '/name = "opendeviationbar-core"/{getline; print $2}' Cargo.lock)
cargo update -p opendeviationbar-core -p opendeviationbar-client --quiet 2>/dev/null || true
AFTER=$(awk -F'"' '/name = "opendeviationbar-core"/{getline; print $2}' Cargo.lock)
if [ "$BEFORE" != "$AFTER" ]; then
  echo "  Updated: $BEFORE -> $AFTER"
else
  echo "  Already at latest: $AFTER"
fi

# 0b. Sync upstream fork (fast-forward only — never conflicts)
echo ""
echo "[1/5] Syncing upstream (flowsurface-rs/flowsurface)..."
git fetch upstream --quiet 2>/dev/null || true
BEHIND=$(git rev-list --count HEAD..upstream/main 2>/dev/null || echo 0)
if [ "$BEHIND" -gt 0 ]; then
  if git merge-base --is-ancestor HEAD upstream/main 2>/dev/null; then
    echo "  Fast-forwarding $BEHIND commits from upstream..."
    git merge upstream/main --ff-only --quiet
    echo "  Upstream synced (fast-forward)"
  else
    echo "  WARNING: $BEHIND upstream commits available but merge requires conflict resolution"
    echo "  Run: mise run upstream:merge"
  fi
else
  echo "  Already up to date with upstream"
fi

# 2. Verify ClickHouse responds
echo ""
echo "[2/5] Checking ClickHouse connectivity..."
for i in $(seq 1 $MAX_RETRIES); do
  RESULT=$(curl -sf --connect-timeout 3 "$CH" --data "SELECT 'ok' FORMAT TabSeparated" 2>&1) && break
  echo "  Attempt $i/$MAX_RETRIES failed, retrying in ${RETRY_DELAY}s..."
  sleep $RETRY_DELAY
done
if [ "$RESULT" != "ok" ]; then
  echo "FATAL: ClickHouse not responding on port 18123 after $MAX_RETRIES attempts"
  echo "  Is bigblack online? Check: ssh bigblack 'clickhouse client -q \"SELECT 1\"'"
  exit 1
fi
echo "  ClickHouse responding"

# 2. Verify opendeviationbar_cache database and table exist
echo ""
echo "[3/5] Checking opendeviationbar_cache schema..."
TABLE_EXISTS=$(curl -sf "$CH" --data "SELECT count() FROM system.tables WHERE database='opendeviationbar_cache' AND name='open_deviation_bars' FORMAT TabSeparated" 2>&1)
if [ "$TABLE_EXISTS" != "1" ]; then
  echo "FATAL: opendeviationbar_cache.open_deviation_bars table not found"
  echo "  Run populate_cache_resumable() from opendeviationbar-py first"
  exit 1
fi
echo "  opendeviationbar_cache.open_deviation_bars exists"

# 3. Verify data is present for at least one symbol/threshold
echo ""
echo "[4/5] Checking range bar data..."
DATA=$(curl -sf "$CH" --data "
  SELECT threshold_decimal_bps, count(*) as bars
  FROM opendeviationbar_cache.open_deviation_bars
  WHERE symbol = 'BTCUSDT'
  GROUP BY threshold_decimal_bps
  ORDER BY threshold_decimal_bps
  FORMAT TabSeparated
" 2>&1)

if [ -z "$DATA" ]; then
  echo "FATAL: No range bar data found for BTCUSDT"
  echo "  Populate cache on bigblack first"
  exit 1
fi

echo "  BTCUSDT thresholds available:"
echo "$DATA" | while IFS=$'\t' read -r threshold bars; do
  printf "    BPR%-4s  %s bars\n" "$((threshold / 10))" "$bars"
done

# 5. SSE sidecar health (only when enabled)
echo ""
if [ "${FLOWSURFACE_SSE_ENABLED:-false}" = "true" ]; then
  echo "[5/5] Checking SSE sidecar..."
  SSE_RESULT=$(curl -sf --connect-timeout 2 "http://localhost:${FLOWSURFACE_SSE_PORT:-18081}/health" 2>&1)
  if [ $? -eq 0 ]; then
    echo "  SSE sidecar OK"
  else
    echo "  WARNING: SSE sidecar not responding (app will fail to receive SSE bars)"
  fi
else
  echo "[5/5] SSE disabled (FLOWSURFACE_SSE_ENABLED=false)"
fi

echo ""
echo "=== Preflight PASSED ==="
"""

["symbols:list"]
description = "List range bar symbols available in ClickHouse (SSoT for ticker filtering)"
depends = ["tunnel:start"]
run = """
CH="http://localhost:18123"

echo "Querying ClickHouse for available range bar symbols..."
SYMBOLS=$(curl -sf "$CH" --data "
  SELECT DISTINCT symbol
  FROM opendeviationbar_cache.open_deviation_bars
  ORDER BY symbol
  FORMAT TabSeparated
" 2>&1)

if [ -z "$SYMBOLS" ]; then
  echo "ERROR: No symbols found in opendeviationbar_cache.open_deviation_bars"
  exit 1
fi

COUNT=$(echo "$SYMBOLS" | wc -l | tr -d ' ')
echo "Found $COUNT symbols in ClickHouse (app queries this at startup):"
echo "$SYMBOLS" | while read -r sym; do printf "  %s\\n" "$sym"; done
"""
